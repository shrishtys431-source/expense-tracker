<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #f5d0dc;
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        .dark {
            background: #1e1e1e;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .dark .container {
            background: #2c2c2c;
        }

        h1 {
            text-align: center;
            color: #e83e8c;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #e83e8c;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .expense {
            display: flex;
            justify-content: space-between;
            background: #fde2ec;
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
        }

        .Food { background: #ffd6a5; }
        .Travel { background: #caffbf; }
        .Shopping { background: #bdb2ff; }
        .Other { background: #ffadad; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💖 Expense Tracker</h1>

    <div class="top-bar">
        <form method="POST">
            <input type="text" name="title" placeholder="Title" required>
            <input type="number" step="0.01" name="amount" placeholder="Amount" required>
            <select name="category">
                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
                <option>Other</option>
            </select>
            <button type="submit">Add</button>
        </form>

        <form method="GET">
            <input type="text" name="search" placeholder="Search">
            <select name="sort">
                <option value="">Sort</option>
                <option value="high">High → Low</option>
                <option value="low">Low → High</option>
            </select>
            <button type="submit">Apply</button>
        </form>
    </div>

    <h3>Total: ₹{{ total }}</h3>

    {% for expense in expenses %}
    <div class="expense {{ expense[3] }}">
        <div>
            <strong>{{ expense[1] }}</strong>  
            ₹{{ expense[2] }}  
            ({{ expense[3] }})
        </div>
        <div>
            <a href="/delete/{{ expense[0] }}">🗑</a>
        </div>
    </div>
    {% endfor %}

    <h3>Category Breakdown</h3>
    <canvas id="chart"></canvas>
</div>

<button onclick="document.body.classList.toggle('dark')">
    Toggle Dark Mode
</button>

<script>
    const ctx = document.getElementById('chart').getContext('2d');

    const data = {
        labels: [{% for c in category_totals %}"{{ c[0] }}",{% endfor %}],
        datasets: [{
            data: [{% for c in category_totals %}{{ c[1] }},{% endfor %}],
        }]
    };

    new Chart(ctx, {
        type: 'pie',
        data: data
    });
</script>

</body>
</html>
